name: ci

on:
  push:
  pull_request:

jobs:
  test-and-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Smoke pipeline
        run: python -m src.pipeline.run_sql --config configs/pipeline.yml
